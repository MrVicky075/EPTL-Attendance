<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eProcurement Technology — Attendance Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --accent-in: #00e5a0;
    --accent-out: #ff4d6d;
    --accent-blue: #4da6ff;
    --text: #e8eaf6;
    --text-dim: #6b7a99;
    --border: #1e2d45;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 24px 16px 60px;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(0,229,160,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(77,166,255,0.05) 0%, transparent 60%);
  }

  .header {
    text-align: center;
    margin-bottom: 36px;
  }

  .header .company {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent-blue);
    font-family: var(--mono);
    margin-bottom: 6px;
  }

  .header h1 {
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent-in) 0%, var(--accent-blue) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header .userchip {
    display: inline-block;
    margin-top: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 16px;
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  /* Live Clock */
  .clock-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
  }

  .clock {
    font-family: var(--mono);
    font-size: clamp(1.8rem, 6vw, 3rem);
    color: var(--text);
    letter-spacing: 0.06em;
    text-shadow: 0 0 20px rgba(77,166,255,0.3);
  }

  .date-display {
    font-family: var(--mono);
    font-size: 0.82rem;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 32px;
    letter-spacing: 0.05em;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }

  .punch-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 20px 36px;
    border: none;
    border-radius: 14px;
    font-family: var(--sans);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
    position: relative;
    overflow: hidden;
    min-width: 160px;
  }

  .punch-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    background: white;
    transition: opacity 0.2s;
  }

  .punch-btn:active::before { opacity: 0.08; }
  .punch-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
  .punch-btn:active { transform: translateY(0); }

  .btn-in {
    background: linear-gradient(135deg, #00c47a, #00e5a0);
    color: #002a1a;
    box-shadow: 0 4px 24px rgba(0,229,160,0.3);
  }

  .btn-out {
    background: linear-gradient(135deg, #d63356, #ff4d6d);
    color: #fff;
    box-shadow: 0 4px 24px rgba(255,77,109,0.3);
  }

  .btn-icon { font-size: 1.5rem; }
  .btn-label { font-size: 0.7rem; letter-spacing: 0.12em; opacity: 0.7; margin-top: 2px; }

  /* Status */
  .status-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }

  .status-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    font-family: var(--mono);
    font-size: 0.82rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-pill .label { color: var(--text-dim); font-size: 0.7rem; }
  .status-pill .val { color: var(--text); }
  .status-pill.in .val { color: var(--accent-in); }
  .status-pill.out .val { color: var(--accent-out); }

  /* Action buttons */
  .action-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .action-btn {
    padding: 9px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: var(--sans);
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s, border-color 0.15s;
    text-decoration: none;
  }

  .action-btn:hover { background: var(--surface2); border-color: var(--accent-blue); color: var(--accent-blue); }
  .action-btn.danger:hover { border-color: var(--accent-out); color: var(--accent-out); }
  .action-btn.pdf-btn:hover { border-color: var(--accent-in); color: var(--accent-in); }

  /* Table */
  .table-wrap {
    max-width: 860px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .table-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 10px;
  }

  .table-header h2 {
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .record-count {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--accent-blue);
    background: rgba(77,166,255,0.1);
    border: 1px solid rgba(77,166,255,0.2);
    border-radius: 6px;
    padding: 3px 10px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    padding: 12px 20px;
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-align: left;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  tbody td {
    padding: 13px 20px;
    font-family: var(--mono);
    font-size: 0.85rem;
  }

  .td-date { color: var(--text-dim); }
  .td-in { color: var(--accent-in); }
  .td-out { color: var(--accent-out); }
  .td-empty { color: var(--border); font-size: 0.75rem; }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 0.85rem;
  }

  .empty-state .big { font-size: 2.5rem; margin-bottom: 12px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 24px;
    font-family: var(--mono);
    font-size: 0.82rem;
    color: var(--text);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.green { border-color: var(--accent-in); color: var(--accent-in); }
  .toast.red { border-color: var(--accent-out); color: var(--accent-out); }

  /* Ripple */
  @keyframes ripple {
    0% { transform: scale(0); opacity: 0.5; }
    100% { transform: scale(4); opacity: 0; }
  }

  .ripple-circle {
    position: absolute;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.3);
    transform: scale(0);
    pointer-events: none;
    animation: ripple 0.5s ease-out forwards;
  }

  @media (max-width: 600px) {
    .punch-btn { min-width: 130px; padding: 16px 24px; }
    thead th, tbody td { padding: 10px 12px; font-size: 0.78rem; }
  }

  /* Hidden file input */
  #jsonImport { display: none; }

  /* PDF styles injected separately */
</style>
</head>
<body>

<div class="header">
  <div class="company">eProcurement Technology</div>
  <h1>Attendance Tracker</h1>
  <div class="userchip">👤 Vikas Songara</div>
</div>

<div class="clock-bar">
  <div class="clock" id="liveClock">00:00:00</div>
</div>
<div class="date-display" id="liveDate">—</div>

<div class="btn-row">
  <button class="punch-btn btn-in" onclick="punch('IN', event)">
    <span class="btn-icon">▶</span>
    IN TIME
    <span class="btn-label">CLOCK IN</span>
  </button>
  <button class="punch-btn btn-out" onclick="punch('OUT', event)">
    <span class="btn-icon">■</span>
    OUT TIME
    <span class="btn-label">CLOCK OUT</span>
  </button>
</div>

<div class="status-bar" id="todayStatus"></div>

<div class="action-row">
  <button class="action-btn pdf-btn" onclick="downloadPDF()">📄 Download PDF</button>
  <button class="action-btn danger" onclick="clearAll()">🗑 Clear All</button>
</div>

<div class="table-wrap">
  <div class="table-header">
    <h2>Attendance Log</h2>
    <div class="record-count" id="recordCount">0 records</div>
  </div>
  <table>
    <thead>
      <tr>
        <th>Date (DD-MM-YYYY)</th>
        <th>In Time</th>
        <th>Out Time</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="big">🕐</div>
    No entries yet. Click IN TIME to start.
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Helpers ────────────────────────────────────────────────
const STORE_KEY = 'attendance_v1';

function pad(n) { return String(n).padStart(2, '0'); }

function getNow() {
  const d = new Date();
  const dd = pad(d.getDate());
  const mm = pad(d.getMonth() + 1);
  const yyyy = d.getFullYear();
  const date = `${dd}-${mm}-${yyyy}`;

  let h = d.getHours();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  const time = `${pad(h)}:${pad(d.getMinutes())}:${pad(d.getSeconds())} ${ampm}`;
  return { date, time, raw: d };
}

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
  catch { return []; }
}

function saveData(data) {
  localStorage.setItem(STORE_KEY, JSON.stringify(data));
}

// ─── Live Clock ──────────────────────────────────────────────
function tickClock() {
  const d = new Date();
  let h = d.getHours();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('liveClock').textContent =
    `${pad(h)}:${pad(d.getMinutes())}:${pad(d.getSeconds())} ${ampm}`;

  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('liveDate').textContent =
    `${days[d.getDay()]}, ${pad(d.getDate())} ${months[d.getMonth()]} ${d.getFullYear()}`;
}
setInterval(tickClock, 1000);
tickClock();

// ─── Punch ───────────────────────────────────────────────────
function punch(type, event) {
  const { date, time } = getNow();
  let data = loadData();

  let entry = data.find(r => r.date === date);
  if (!entry) {
    entry = { date, in: '', out: '' };
    data.unshift(entry);
  }

  if (type === 'IN') {
    entry.in = time;
    showToast(`✅ IN TIME recorded: ${time}`, 'green');
  } else {
    entry.out = time;
    showToast(`🔴 OUT TIME recorded: ${time}`, 'red');
  }

  saveData(data);
  renderTable();
  renderTodayStatus();

  // Ripple
  const btn = event.currentTarget;
  const circle = document.createElement('span');
  circle.className = 'ripple-circle';
  const rect = btn.getBoundingClientRect();
  circle.style.left = (event.clientX - rect.left - 20) + 'px';
  circle.style.top = (event.clientY - rect.top - 20) + 'px';
  btn.appendChild(circle);
  setTimeout(() => circle.remove(), 600);
}

// ─── Render ───────────────────────────────────────────────────
function renderTable() {
  const data = loadData();
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');
  document.getElementById('recordCount').textContent = `${data.length} record${data.length !== 1 ? 's' : ''}`;

  if (data.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = data.map(r => `
    <tr>
      <td class="td-date">${r.date}</td>
      <td class="${r.in ? 'td-in' : 'td-empty'}">${r.in || '—'}</td>
      <td class="${r.out ? 'td-out' : 'td-empty'}">${r.out || '—'}</td>
    </tr>
  `).join('');
}

function renderTodayStatus() {
  const { date } = getNow();
  const data = loadData();
  const entry = data.find(r => r.date === date);
  const bar = document.getElementById('todayStatus');

  bar.innerHTML = `
    <div class="status-pill in">
      <span class="label">TODAY IN</span>
      <span class="val">${entry?.in || '—'}</span>
    </div>
    <div class="status-pill out">
      <span class="label">TODAY OUT</span>
      <span class="val">${entry?.out || '—'}</span>
    </div>
  `;
}

// ─── Toast ────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, cls = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + cls;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 2800);
}


// ─── Clear ────────────────────────────────────────────────────
function clearAll() {
  if (!confirm('Delete ALL attendance records? This cannot be undone.')) return;
  localStorage.removeItem(STORE_KEY);
  renderTable();
  renderTodayStatus();
  showToast('🗑 All records cleared', 'red');
}

// ─── PDF Download ─────────────────────────────────────────────
function downloadPDF() {
  const data = loadData();
  if (data.length === 0) { showToast('No data to export', 'red'); return; }

  const now = new Date();
  const dateStr = `${pad(now.getDate())}-${pad(now.getMonth()+1)}-${now.getFullYear()}`;

  const rows = data.map((r, i) => `
    <tr>
      <td class="td-date">${r.date}</td>
      <td class="${r.in ? 'td-in' : 'td-date'}">${r.in || '—'}</td>
      <td class="${r.out ? 'td-out' : 'td-date'}">${r.out || '—'}</td>
    </tr>
  `).join('');

  const html = `<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap');
  body { font-family: 'Syne', Arial, sans-serif; background: #fff; margin: 0; padding: 32px; color: #111; }
  .pdf-header { border-bottom: 3px solid #111; padding-bottom: 18px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: flex-end; }
  .pdf-header-left .company { font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: #2563eb; font-family: monospace; margin-bottom: 4px; }
  .pdf-header-left h1 { font-size: 1.7rem; font-weight: 800; margin: 0 0 6px; }
  .pdf-header-left .user { font-size: 0.82rem; color: #6b7280; font-family: monospace; }
  .pdf-header-right { text-align: right; font-size: 0.75rem; color: #6b7280; font-family: monospace; line-height: 1.7; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: #111; color: #fff; padding: 11px 16px; text-align: left; font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; }
  tbody tr:nth-child(even) { background: #f9fafb; }
  tbody td { padding: 10px 16px; border-bottom: 1px solid #e5e7eb; font-family: monospace; font-size: 0.88rem; }
  .td-date { color: #374151; }
  .td-in { color: #059669; font-weight: 600; }
  .td-out { color: #dc2626; font-weight: 600; }
  .summary { display: flex; gap: 16px; margin-bottom: 24px; }
  .stat { background: #f3f4f6; border-radius: 8px; padding: 12px 20px; flex: 1; border-left: 3px solid #111; }
  .stat .n { font-size: 1.5rem; font-weight: 800; }
  .stat .l { font-size: 0.7rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.06em; }
  .footer { margin-top: 24px; font-size: 0.7rem; color: #9ca3af; text-align: center; font-family: monospace; border-top: 1px solid #e5e7eb; padding-top: 12px; }
</style>
</head><body>
<div class="pdf-header">
  <div class="pdf-header-left">
    <div class="company">eProcurement Technology</div>
    <h1>Attendance Tracker</h1>
    <div class="user">👤 Vikas Songara</div>
  </div>
  <div class="pdf-header-right">
    Generated: ${dateStr}<br>
    Total Records: ${data.length}
  </div>
</div>
<div class="summary">
  <div class="stat"><div class="n">${data.length}</div><div class="l">Total Days</div></div>
  <div class="stat"><div class="n">${data.filter(r=>r.in).length}</div><div class="l">Days Clocked In</div></div>
  <div class="stat"><div class="n">${data.filter(r=>r.out).length}</div><div class="l">Days Clocked Out</div></div>
</div>
<table>
  <thead><tr>
    <th>Date (DD-MM-YYYY)</th>
    <th>In Time</th>
    <th>Out Time</th>
  </tr></thead>
  <tbody>${rows}</tbody>
</table>
<div class="footer">eProcurement Technology &nbsp;•&nbsp; Attendance Tracker &nbsp;•&nbsp; Vikas Songara &nbsp;•&nbsp; Generated on ${dateStr}</div>
<script>window.onload=()=>{window.print();}<\/script>
</body></html>`;

  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  showToast('📄 PDF window opened — use Print > Save as PDF', 'green');
}

// ─── Init ─────────────────────────────────────────────────────
renderTable();
renderTodayStatus();
</script>
</body>
</html>
