<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eProcurement Technology — Attendance Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --accent-in: #00e5a0;
    --accent-out: #ff4d6d;
    --accent-blue: #4da6ff;
    --accent-yellow: #fbbf24;
    --text: #e8eaf6;
    --text-dim: #6b7a99;
    --border: #1e2d45;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 24px 16px 80px;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(0,229,160,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(77,166,255,0.05) 0%, transparent 60%);
  }

  /* ── Header ── */
  .header { text-align: center; margin-bottom: 32px; }
  .header .company { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent-blue); font-family: var(--mono); margin-bottom: 6px; }
  .header h1 { font-size: clamp(1.5rem, 4vw, 2.4rem); font-weight: 800; letter-spacing: -0.02em; background: linear-gradient(135deg, var(--accent-in) 0%, var(--accent-blue) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .header .userchip { display: inline-block; margin-top: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 5px 16px; font-family: var(--mono); font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.05em; }

  /* ── Clock ── */
  .clock-bar { display: flex; justify-content: center; margin-bottom: 6px; }
  .clock { font-family: var(--mono); font-size: clamp(1.8rem, 6vw, 3rem); color: var(--text); letter-spacing: 0.06em; text-shadow: 0 0 20px rgba(77,166,255,0.3); }
  .date-display { font-family: var(--mono); font-size: 0.82rem; color: var(--text-dim); text-align: center; margin-bottom: 28px; letter-spacing: 0.05em; }

  /* ── Punch Buttons ── */
  .btn-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 28px; flex-wrap: wrap; }
  .punch-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 20px 36px; border: none; border-radius: 14px; font-family: var(--sans); font-size: 1rem; font-weight: 600; cursor: pointer; letter-spacing: 0.04em; transition: transform 0.15s, box-shadow 0.15s, filter 0.15s; position: relative; overflow: hidden; min-width: 160px; }
  .punch-btn::before { content: ''; position: absolute; inset: 0; opacity: 0; background: white; transition: opacity 0.2s; }
  .punch-btn:active::before { opacity: 0.08; }
  .punch-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
  .punch-btn:active { transform: translateY(0); }
  .punch-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; filter: none !important; }
  .btn-in { background: linear-gradient(135deg, #00c47a, #00e5a0); color: #002a1a; box-shadow: 0 4px 24px rgba(0,229,160,0.3); }
  .btn-out { background: linear-gradient(135deg, #d63356, #ff4d6d); color: #fff; box-shadow: 0 4px 24px rgba(255,77,109,0.3); }
  .btn-icon { font-size: 1.5rem; }
  .btn-label { font-size: 0.68rem; letter-spacing: 0.12em; opacity: 0.7; margin-top: 2px; }

  /* ── Today Status Pills ── */
  .status-bar { display: flex; justify-content: center; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
  .status-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 9px 18px; font-family: var(--mono); font-size: 0.8rem; display: flex; align-items: center; gap: 8px; }
  .status-pill .label { color: var(--text-dim); font-size: 0.68rem; }
  .status-pill .val { color: var(--text); }
  .status-pill.in .val { color: var(--accent-in); }
  .status-pill.out .val { color: var(--accent-out); }
  .status-pill.early .val { color: var(--accent-in); }
  .status-pill.late .val { color: var(--accent-out); }
  .status-pill.cover .val { color: var(--accent-yellow); }

  /* ── Action Row ── */
  .action-row { display: flex; justify-content: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .action-btn { padding: 9px 18px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: var(--sans); font-size: 0.82rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s, border-color 0.15s, color 0.15s; }
  .action-btn:hover { background: var(--surface2); border-color: var(--accent-blue); color: var(--accent-blue); }
  .action-btn.danger:hover { border-color: var(--accent-out); color: var(--accent-out); }
  .action-btn.pdf-btn:hover { border-color: var(--accent-in); color: var(--accent-in); }
  .action-btn.add-btn { border-color: rgba(0,229,160,0.3); }
  .action-btn.add-btn:hover { border-color: var(--accent-in); color: var(--accent-in); }

  /* ── Table ── */
  .table-wrap { max-width: 1100px; margin: 0 auto; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .table-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 22px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 10px; }
  .table-header h2 { font-size: 0.85rem; font-weight: 600; letter-spacing: 0.06em; color: var(--text-dim); text-transform: uppercase; }
  .record-count { font-family: var(--mono); font-size: 0.75rem; color: var(--accent-blue); background: rgba(77,166,255,0.1); border: 1px solid rgba(77,166,255,0.2); border-radius: 6px; padding: 3px 10px; }

  .tbl-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 780px; }
  thead th { padding: 11px 14px; font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.1em; color: var(--text-dim); text-align: left; background: var(--surface2); border-bottom: 1px solid var(--border); text-transform: uppercase; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 11px 14px; font-family: var(--mono); font-size: 0.82rem; vertical-align: middle; }

  .td-date { color: var(--text-dim); white-space: nowrap; }
  .td-in { color: var(--accent-in); }
  .td-out { color: var(--accent-out); }
  .td-early { color: var(--accent-in); }
  .td-late { color: var(--accent-out); }
  .td-cover { color: var(--accent-yellow); }
  .td-zero { color: var(--text-dim); opacity: 0.5; }
  .td-empty { color: var(--border); font-size: 0.72rem; }

  /* Inline edit */
  .edit-input {
    background: var(--surface2);
    border: 1px solid var(--accent-blue);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.82rem;
    padding: 4px 8px;
    width: 120px;
    outline: none;
  }
  .edit-input:focus { border-color: var(--accent-in); box-shadow: 0 0 0 2px rgba(0,229,160,0.15); }

  /* Action icons in row */
  .row-actions { display: flex; gap: 6px; align-items: center; }
  .icon-btn { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 3px 5px; border-radius: 5px; transition: background 0.12s; color: var(--text-dim); line-height: 1; }
  .icon-btn:hover { background: var(--surface2); color: var(--text); }
  .icon-btn.save { color: var(--accent-in); }
  .icon-btn.cancel { color: var(--accent-out); }
  .icon-btn.edit { color: var(--accent-blue); }
  .icon-btn.del { color: var(--text-dim); }
  .icon-btn.del:hover { color: var(--accent-out); }

  /* Empty state */
  .empty-state { text-align: center; padding: 48px 20px; color: var(--text-dim); font-family: var(--mono); font-size: 0.85rem; }
  .empty-state .big { font-size: 2.5rem; margin-bottom: 12px; }

  /* Modal */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px 32px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 20px; color: var(--text); }
  .modal-field { margin-bottom: 16px; }
  .modal-field label { display: block; font-family: var(--mono); font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
  .modal-field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--mono); font-size: 0.88rem; padding: 10px 12px; outline: none; transition: border-color 0.15s; }
  .modal-field input:focus { border-color: var(--accent-blue); }
  .modal-actions { display: flex; gap: 10px; margin-top: 22px; justify-content: flex-end; }
  .modal-btn { padding: 9px 22px; border-radius: 8px; font-family: var(--sans); font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; transition: filter 0.15s; }
  .modal-btn.primary { background: linear-gradient(135deg, #00c47a, #00e5a0); color: #002a1a; }
  .modal-btn.secondary { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
  .modal-btn:hover { filter: brightness(1.1); }

  /* Toast */
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 24px; font-family: var(--mono); font-size: 0.82rem; color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,0.4); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 300; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.green { border-color: var(--accent-in); color: var(--accent-in); }
  .toast.red { border-color: var(--accent-out); color: var(--accent-out); }
  .toast.yellow { border-color: var(--accent-yellow); color: var(--accent-yellow); }

  /* Ripple */
  @keyframes ripple { 0% { transform: scale(0); opacity: 0.5; } 100% { transform: scale(4); opacity: 0; } }
  .ripple-circle { position: absolute; border-radius: 50%; width: 40px; height: 40px; background: rgba(255,255,255,0.3); transform: scale(0); pointer-events: none; animation: ripple 0.5s ease-out forwards; }

  /* ── Monthly Summary ── */
  .monthly-wrap { max-width: 700px; margin: 0 auto 28px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .monthly-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .monthly-header .mh-title { font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); }
  .monthly-header .mh-badge { font-family: var(--mono); font-size: 0.68rem; color: var(--accent-blue); background: rgba(77,166,255,0.1); border: 1px solid rgba(77,166,255,0.2); border-radius: 5px; padding: 2px 9px; }
  .monthly-grid { display: grid; grid-template-columns: repeat(3, 1fr); }
  .monthly-stat { padding: 16px 20px; border-right: 1px solid var(--border); text-align: center; }
  .monthly-stat:last-child { border-right: none; }
  .monthly-stat .ms-val { font-family: var(--mono); font-size: 1.3rem; font-weight: 700; letter-spacing: 0.04em; margin-bottom: 4px; }
  .monthly-stat .ms-label { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); }
  .monthly-stat .ms-sub { font-family: var(--mono); font-size: 0.63rem; color: var(--text-dim); margin-top: 3px; opacity: 0.65; }
  .ms-red { color: var(--accent-out); }
  .ms-green { color: var(--accent-in); }
  .ms-zero { color: var(--text-dim); }
  .ms-yellow { color: var(--accent-yellow); }

  @media (max-width: 600px) {
    .punch-btn { min-width: 130px; padding: 16px 20px; }
    .monthly-grid { grid-template-columns: 1fr; }
    .monthly-stat { border-right: none; border-bottom: 1px solid var(--border); }
    .monthly-stat:last-child { border-bottom: none; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="company">eProcurement Technology</div>
  <h1>Attendance Tracker</h1>
  <div class="userchip">👤 Vikas Songara</div>
</div>

<!-- Clock -->
<div class="clock-bar"><div class="clock" id="liveClock">00:00:00</div></div>
<div class="date-display" id="liveDate">—</div>

<!-- Punch Buttons -->
<div class="btn-row">
  <button class="punch-btn btn-in" id="btnIn" onclick="punch('IN', event)">
    <span class="btn-icon">▶</span>
    IN TIME
    <span class="btn-label">CLOCK IN</span>
  </button>
  <button class="punch-btn btn-out" onclick="punch('OUT', event)">
    <span class="btn-icon">■</span>
    OUT TIME
    <span class="btn-label">CLOCK OUT</span>
  </button>
</div>

<!-- Today Status -->
<div class="status-bar" id="todayStatus"></div>

<!-- Monthly Summary -->
<div class="monthly-wrap" id="monthlySummary"></div>

<!-- Actions -->
<div class="action-row">
  <button class="action-btn add-btn" onclick="openAddModal()">➕ Add Entry</button>
  <button class="action-btn pdf-btn" onclick="downloadPDF()">📄 Download PDF</button>
  <button class="action-btn danger" onclick="clearAll()">🗑 Clear All</button>
</div>

<!-- Table -->
<div class="table-wrap">
  <div class="table-header">
    <h2>Attendance Log</h2>
    <div class="record-count" id="recordCount">0 records</div>
  </div>
  <div class="tbl-scroll">
    <table>
      <thead>
        <tr>
          <th>Date (DD-MM-YYYY)</th>
          <th>In Time</th>
          <th>Out Time</th>
          <th>Early By</th>
          <th>Late By</th>
          <th>Time Cover</th>
          <th style="width:80px">Edit</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="empty-state" id="emptyState">
    <div class="big">🕐</div>
    No entries yet. Click IN TIME or Add Entry to start.
  </div>
</div>

<!-- Add Entry Modal -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <h3>➕ Add / Edit Entry</h3>
    <div class="modal-field">
      <label>Date (DD-MM-YYYY)</label>
      <input type="text" id="mDate" placeholder="e.g. 25-03-2025" maxlength="10">
    </div>
    <div class="modal-field">
      <label>In Time (hh:mm:ss AM/PM)</label>
      <input type="text" id="mIn" placeholder="e.g. 10:05:00 AM">
    </div>
    <div class="modal-field">
      <label>Out Time (hh:mm:ss AM/PM)</label>
      <input type="text" id="mOut" placeholder="e.g. 07:15:00 PM">
    </div>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>
      <button class="modal-btn primary" onclick="saveModal()">Save Entry</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Constants ────────────────────────────────────────────────
const STORE_KEY   = 'attendance_v2';
const WORK_HOURS  = 9;        // required daily hours
const WORK_MINS   = WORK_HOURS * 60;

// ─── Helpers ─────────────────────────────────────────────────
function pad(n) { return String(n).padStart(2, '0'); }

function getNow() {
  const d = new Date();
  const date = `${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()}`;
  let h = d.getHours();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  const time = `${pad(h)}:${pad(d.getMinutes())}:${pad(d.getSeconds())} ${ampm}`;
  return { date, time };
}

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
  catch { return []; }
}

function saveData(data) {
  localStorage.setItem(STORE_KEY, JSON.stringify(data));
}

// Parse "hh:mm:ss AM/PM" → total minutes from midnight
function parseTime(str) {
  if (!str) return null;
  const m = str.trim().match(/^(\d{1,2}):(\d{2}):(\d{2})\s*(AM|PM)$/i);
  if (!m) return null;
  let h = parseInt(m[1]);
  const min = parseInt(m[2]);
  const sec = parseInt(m[3]);
  const ap = m[4].toUpperCase();
  if (ap === 'AM') { if (h === 12) h = 0; }
  else             { if (h !== 12) h += 12; }
  return h * 60 + min + sec / 60;
}

// Calculate Early By / Late By / Time Cover
// Returns { earlyMin, lateMin, coverMin } all in minutes
function calcStats(inStr, outStr) {
  const inM  = parseTime(inStr);
  const outM = parseTime(outStr);
  if (inM === null || outM === null) return null;

  const workedMin = outM - inM;
  const diff = workedMin - WORK_MINS;
  // diff > 0 → stayed LATE (extra time)  → Late By = diff,   Early By = 0
  // diff < 0 → left EARLY (short time)   → Early By = |diff|, Late By = 0
  const lateMin  = diff > 0 ?  diff : 0;
  const earlyMin = diff < 0 ? -diff : 0;
  const coverMin = earlyMin - lateMin;   // net deficit: +ve = still short, -ve = surplus
  return { earlyMin, lateMin, coverMin, workedMin };
}

function fmtMins(m) {
  if (m === null || m === undefined) return '—';
  const h = Math.floor(Math.abs(m) / 60);
  const min = Math.round(Math.abs(m) % 60);
  if (h > 0) return `${h}h ${pad(min)}m`;
  return `${pad(min)}m`;
}

function fmtMinShort(m) {
  if (m === null || m === undefined || m <= 0) return '00';
  return pad(Math.round(m));
}

// ─── Live Clock ───────────────────────────────────────────────
function tickClock() {
  const d = new Date();
  let h = d.getHours();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('liveClock').textContent =
    `${pad(h)}:${pad(d.getMinutes())}:${pad(d.getSeconds())} ${ampm}`;
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('liveDate').textContent =
    `${days[d.getDay()]}, ${pad(d.getDate())} ${months[d.getMonth()]} ${d.getFullYear()}`;
}
setInterval(tickClock, 1000); tickClock();

// ─── Punch (IN only once per day) ────────────────────────────
function punch(type, event) {
  const { date, time } = getNow();
  let data = loadData();

  let entry = data.find(r => r.date === date);
  if (!entry) {
    entry = { date, in: '', out: '' };
    data.unshift(entry);
  }

  if (type === 'IN') {
    if (entry.in) {
      showToast('⚠️ IN TIME already recorded today!', 'yellow');
      return;
    }
    entry.in = time;
    showToast(`✅ IN TIME recorded: ${time}`, 'green');
  } else {
    entry.out = time;
    showToast(`🔴 OUT TIME recorded: ${time}`, 'red');
  }

  saveData(data);
  renderTable();
  renderTodayStatus();
  renderMonthlySummary();
  checkInBtn();

  // Ripple
  const btn = event.currentTarget;
  const circle = document.createElement('span');
  circle.className = 'ripple-circle';
  const rect = btn.getBoundingClientRect();
  circle.style.left = (event.clientX - rect.left - 20) + 'px';
  circle.style.top  = (event.clientY - rect.top  - 20) + 'px';
  btn.appendChild(circle);
  setTimeout(() => circle.remove(), 600);
}

function checkInBtn() {
  const { date } = getNow();
  const data  = loadData();
  const entry = data.find(r => r.date === date);
  const btnIn = document.getElementById('btnIn');
  if (entry && entry.in) {
    btnIn.disabled = true;
    btnIn.querySelector('.btn-label').textContent = 'DONE FOR TODAY';
  } else {
    btnIn.disabled = false;
    btnIn.querySelector('.btn-label').textContent = 'CLOCK IN';
  }
}

// ─── Render Table ─────────────────────────────────────────────
let editingDate = null;  // tracks which row is in edit mode

function renderTable() {
  const data  = loadData();
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');
  document.getElementById('recordCount').textContent =
    `${data.length} record${data.length !== 1 ? 's' : ''}`;

  if (data.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = data.map(r => {
    const stats = calcStats(r.in, r.out);
    const isEditing = (editingDate === r.date);

    if (isEditing) {
      return `
        <tr>
          <td class="td-date">${r.date}</td>
          <td><input class="edit-input" id="edit-in"  value="${r.in  || ''}" placeholder="hh:mm:ss AM"></td>
          <td><input class="edit-input" id="edit-out" value="${r.out || ''}" placeholder="hh:mm:ss PM"></td>
          <td colspan="3" style="color:var(--text-dim);font-size:0.72rem;font-family:var(--mono)">— recalculates on save —</td>
          <td>
            <div class="row-actions">
              <button class="icon-btn save" title="Save" onclick="saveEditRow('${r.date}')">💾</button>
              <button class="icon-btn cancel" title="Cancel" onclick="cancelEdit()">✕</button>
            </div>
          </td>
        </tr>`;
    }

    const earlyTxt = stats ? (stats.earlyMin > 0 ? fmtMins(stats.earlyMin) : '00') : '—';
    const lateTxt  = stats ? (stats.lateMin  > 0 ? fmtMins(stats.lateMin)  : '00') : '—';
    const coverTxt = stats
      ? (stats.coverMin > 0 ? fmtMins(stats.coverMin)
        : stats.coverMin < 0 ? `+${fmtMins(-stats.coverMin)}` : '00')
      : '—';

    // Early By = left early = shortfall = RED
    // Late By  = stayed late = extra    = GREEN
    // Cover    = +ve still short = RED, -ve surplus = GREEN
    const earlyClass = stats && stats.earlyMin > 0 ? 'td-late'  : 'td-zero';  // red
    const lateClass  = stats && stats.lateMin  > 0 ? 'td-early' : 'td-zero';  // green
    const coverClass = stats
      ? (stats.coverMin > 0 ? 'td-late' : stats.coverMin < 0 ? 'td-early' : 'td-zero')
      : 'td-zero';

    return `
      <tr>
        <td class="td-date">${r.date}</td>
        <td class="${r.in  ? 'td-in'    : 'td-empty'}">${r.in  || '—'}</td>
        <td class="${r.out ? 'td-out'   : 'td-empty'}">${r.out || '—'}</td>
        <td class="${earlyClass}">${earlyTxt}</td>
        <td class="${lateClass}">${lateTxt}</td>
        <td class="${coverClass}">${coverTxt}</td>
        <td>
          <div class="row-actions">
            <button class="icon-btn edit" title="Edit" onclick="startEdit('${r.date}')">✏️</button>
            <button class="icon-btn del"  title="Delete" onclick="deleteRow('${r.date}')">🗑</button>
          </div>
        </td>
      </tr>`;
  }).join('');
}

// ─── Row Edit ─────────────────────────────────────────────────
function startEdit(date) {
  editingDate = date;
  renderTable();
  // focus first input
  setTimeout(() => { const el = document.getElementById('edit-in'); if(el) el.focus(); }, 50);
}

function cancelEdit() {
  editingDate = null;
  renderTable();
}

function saveEditRow(date) {
  const inVal  = (document.getElementById('edit-in')?.value  || '').trim();
  const outVal = (document.getElementById('edit-out')?.value || '').trim();

  // Validate
  if (inVal  && !parseTime(inVal))  { showToast('❌ Invalid In Time format', 'red');  return; }
  if (outVal && !parseTime(outVal)) { showToast('❌ Invalid Out Time format', 'red'); return; }

  let data  = loadData();
  const idx = data.findIndex(r => r.date === date);
  if (idx !== -1) {
    data[idx].in  = inVal;
    data[idx].out = outVal;
    saveData(data);
  }
  editingDate = null;
  renderTable();
  renderTodayStatus();
  renderMonthlySummary();
  checkInBtn();
  showToast('✅ Entry updated', 'green');
}

function deleteRow(date) {
  if (!confirm(`Delete entry for ${date}?`)) return;
  let data = loadData();
  data = data.filter(r => r.date !== date);
  saveData(data);
  if (editingDate === date) editingDate = null;
  renderTable();
  renderTodayStatus();
  renderMonthlySummary();
  checkInBtn();
  showToast('🗑 Entry deleted', 'red');
}

// ─── Today Status Bar (TODAY IN / OUT only) ──────────────────
function renderTodayStatus() {
  const { date } = getNow();
  const data  = loadData();
  const entry = data.find(r => r.date === date);
  const bar   = document.getElementById('todayStatus');

  bar.innerHTML = `
    <div class="status-pill in">
      <span class="label">TODAY IN</span>
      <span class="val">${entry?.in  || '—'}</span>
    </div>
    <div class="status-pill out">
      <span class="label">TODAY OUT</span>
      <span class="val">${entry?.out || '—'}</span>
    </div>
  `;
}

// ─── Monthly Summary (all records aggregate) ─────────────────
function renderMonthlySummary() {
  const data = loadData();
  const wrap = document.getElementById('monthlySummary');
  if (!wrap) return;

  if (data.length === 0) {
    wrap.innerHTML = '';
    return;
  }

  // Aggregate across ALL records
  let totalEarlyMin = 0;  // sum of shortfall days
  let totalLateMin  = 0;  // sum of extra days
  let countDays     = 0;

  data.forEach(r => {
    const s = calcStats(r.in, r.out);
    if (!s) return;
    countDays++;
    totalEarlyMin += s.earlyMin;  // left early (deficit)
    totalLateMin  += s.lateMin;   // stayed late (surplus)
  });

  // Net: positive = still short overall, negative = surplus overall
  const netCoverMin = totalEarlyMin - totalLateMin;

  const earlyTxt = totalEarlyMin > 0 ? fmtMins(totalEarlyMin) : '00';
  const lateTxt  = totalLateMin  > 0 ? fmtMins(totalLateMin)  : '00';
  const coverTxt = netCoverMin === 0
    ? '00'
    : netCoverMin > 0
      ? fmtMins(netCoverMin)          // still in deficit
      : '+' + fmtMins(-netCoverMin);  // surplus

  const earlyClass = totalEarlyMin > 0 ? 'ms-red'   : 'ms-zero';
  const lateClass  = totalLateMin  > 0 ? 'ms-green' : 'ms-zero';
  const coverClass = netCoverMin > 0 ? 'ms-red' : netCoverMin < 0 ? 'ms-green' : 'ms-zero';

  // Current month label from most recent entry
  let monthLabel = 'ALL RECORDS';
  if (data.length > 0) {
    const latest = data[0].date;  // already sorted newest first
    const parts = latest.split('-');
    if (parts.length === 3) {
      const months = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      monthLabel = months[parseInt(parts[1])] + ' ' + parts[2];
    }
  }

  wrap.innerHTML = `
    <div class="monthly-header">
      <span class="mh-title">📊 Monthly Time Summary</span>
      <span class="mh-badge">${monthLabel} &nbsp;·&nbsp; ${countDays} day${countDays !== 1 ? 's' : ''}</span>
    </div>
    <div class="monthly-grid">
      <div class="monthly-stat">
        <div class="ms-val ${earlyClass}">${earlyTxt}</div>
        <div class="ms-label">Early By</div>
        <div class="ms-sub">Total shortfall</div>
      </div>
      <div class="monthly-stat">
        <div class="ms-val ${lateClass}">${lateTxt}</div>
        <div class="ms-label">Late By</div>
        <div class="ms-sub">Total extra time</div>
      </div>
      <div class="monthly-stat">
        <div class="ms-val ${coverClass}">${coverTxt}</div>
        <div class="ms-label">Time Cover</div>
        <div class="ms-sub">Early − Late (net)</div>
      </div>
    </div>
  `;
}

// ─── Add Entry Modal ──────────────────────────────────────────
function openAddModal() {
  const { date } = getNow();
  document.getElementById('mDate').value = date;
  document.getElementById('mIn').value   = '';
  document.getElementById('mOut').value  = '';
  document.getElementById('addModal').classList.add('open');
}

function closeModal() {
  document.getElementById('addModal').classList.remove('open');
}

document.getElementById('addModal').addEventListener('click', e => {
  if (e.target === document.getElementById('addModal')) closeModal();
});

function saveModal() {
  const date   = document.getElementById('mDate').value.trim();
  const inVal  = document.getElementById('mIn').value.trim();
  const outVal = document.getElementById('mOut').value.trim();

  // Validate date format DD-MM-YYYY
  if (!/^\d{2}-\d{2}-\d{4}$/.test(date)) {
    showToast('❌ Date must be DD-MM-YYYY', 'red'); return;
  }
  if (inVal  && !parseTime(inVal))  { showToast('❌ Invalid In Time format',  'red'); return; }
  if (outVal && !parseTime(outVal)) { showToast('❌ Invalid Out Time format', 'red'); return; }

  let data  = loadData();
  let entry = data.find(r => r.date === date);
  if (entry) {
    // Update existing
    entry.in  = inVal;
    entry.out = outVal;
    showToast(`✅ Entry for ${date} updated`, 'green');
  } else {
    // Add new, insert sorted
    data.push({ date, in: inVal, out: outVal });
    data.sort((a, b) => {
      const p = s => { const [d,m,y] = s.split('-'); return new Date(y,m-1,d); };
      return p(b.date) - p(a.date);
    });
    showToast(`✅ Entry for ${date} added`, 'green');
  }
  saveData(data);
  closeModal();
  renderTable();
  renderTodayStatus();
  checkInBtn();
}

// ─── Clear All ────────────────────────────────────────────────
function clearAll() {
  if (!confirm('Delete ALL attendance records? This cannot be undone.')) return;
  localStorage.removeItem(STORE_KEY);
  editingDate = null;
  renderTable();
  renderTodayStatus();
  renderMonthlySummary();
  checkInBtn();
  showToast('🗑 All records cleared', 'red');
}

// ─── Toast ────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, cls = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast show ' + cls;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 2800);
}

// ─── PDF Download ─────────────────────────────────────────────
function downloadPDF() {
  const data = loadData();
  if (data.length === 0) { showToast('No data to export', 'red'); return; }

  const now     = new Date();
  const dateStr = `${pad(now.getDate())}-${pad(now.getMonth()+1)}-${now.getFullYear()}`;

  const rows = data.map((r, i) => {
    const stats = calcStats(r.in, r.out);
    const earlyTxt = stats ? (stats.earlyMin > 0 ? fmtMins(stats.earlyMin) : '00') : '—';
    const lateTxt  = stats ? (stats.lateMin  > 0 ? fmtMins(stats.lateMin)  : '00') : '—';
    const coverTxt = stats
      ? (stats.coverMin > 0 ? fmtMins(stats.coverMin) : (stats.coverMin < 0 ? `+${fmtMins(-stats.coverMin)}` : '00'))
      : '—';

    // Early By = left early = shortfall = RED; Late By = stayed late = extra = GREEN
    const earlyStyle = stats && stats.earlyMin > 0 ? 'color:#dc2626;font-weight:600' : 'color:#9ca3af';
    const lateStyle  = stats && stats.lateMin  > 0 ? 'color:#059669;font-weight:600' : 'color:#9ca3af';
    const coverStyle = stats
      ? (stats.coverMin > 0 ? 'color:#dc2626;font-weight:600' : stats.coverMin < 0 ? 'color:#059669;font-weight:600' : 'color:#9ca3af')
      : 'color:#9ca3af';

    return `
      <tr style="background:${i%2===0?'#f9fafb':'#fff'}">
        <td style="padding:9px 12px;border-bottom:1px solid #e5e7eb;font-family:monospace;color:#374151;white-space:nowrap">${r.date}</td>
        <td style="padding:9px 12px;border-bottom:1px solid #e5e7eb;font-family:monospace;color:#059669;font-weight:600">${r.in  || '—'}</td>
        <td style="padding:9px 12px;border-bottom:1px solid #e5e7eb;font-family:monospace;color:#dc2626;font-weight:600">${r.out || '—'}</td>
        <td style="padding:9px 12px;border-bottom:1px solid #e5e7eb;font-family:monospace;${earlyStyle}">${earlyTxt}</td>
        <td style="padding:9px 12px;border-bottom:1px solid #e5e7eb;font-family:monospace;${lateStyle}">${lateTxt}</td>
        <td style="padding:9px 12px;border-bottom:1px solid #e5e7eb;font-family:monospace;${coverStyle}">${coverTxt}</td>
      </tr>`;
  }).join('');

  const totalEarly = data.reduce((s,r) => { const st = calcStats(r.in,r.out); return s + (st ? st.earlyMin : 0); }, 0);
  const totalLate  = data.reduce((s,r) => { const st = calcStats(r.in,r.out); return s + (st ? st.lateMin  : 0); }, 0);

  const html = `<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap');
  * { box-sizing: border-box; }
  body { font-family: 'Syne', Arial, sans-serif; background: #fff; margin: 0; padding: 32px; color: #111; }
  .pdf-header { border-bottom: 3px solid #111; padding-bottom: 16px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; }
  .pdf-header-left .company { font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; color: #2563eb; font-family: monospace; margin-bottom: 4px; }
  .pdf-header-left h1 { font-size: 1.6rem; font-weight: 800; margin: 0 0 5px; }
  .pdf-header-left .user { font-size: 0.8rem; color: #6b7280; font-family: monospace; }
  .pdf-header-right { text-align: right; font-size: 0.72rem; color: #6b7280; font-family: monospace; line-height: 1.7; }
  .summary { display: flex; gap: 12px; margin-bottom: 20px; }
  .stat { background: #f3f4f6; border-radius: 8px; padding: 10px 16px; flex: 1; border-left: 3px solid #111; }
  .stat .n { font-size: 1.3rem; font-weight: 800; }
  .stat .l { font-size: 0.65rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: #111; color: #fff; padding: 10px 12px; text-align: left; font-size: 0.7rem; letter-spacing: 0.07em; text-transform: uppercase; white-space: nowrap; }
  .note { margin-top: 12px; font-size: 0.7rem; color: #9ca3af; font-family: monospace; background: #f9fafb; border-radius: 6px; padding: 8px 12px; }
  .footer { margin-top: 20px; font-size: 0.68rem; color: #9ca3af; text-align: center; font-family: monospace; border-top: 1px solid #e5e7eb; padding-top: 10px; }
  @media print { body { padding: 16px; } }
</style>
</head><body>
<div class="pdf-header">
  <div class="pdf-header-left">
    <div class="company">eProcurement Technology</div>
    <h1>Attendance Tracker</h1>
    <div class="user">👤 Vikas Songara</div>
  </div>
  <div class="pdf-header-right">
    Generated: ${dateStr}<br>
    Total Records: ${data.length}<br>
    Standard Hours: ${WORK_HOURS}h/day
  </div>
</div>
<div class="summary">
  <div class="stat"><div class="n">${data.length}</div><div class="l">Total Days</div></div>
  <div class="stat"><div class="n">${data.filter(r=>r.in).length}</div><div class="l">Days Clocked In</div></div>
  <div class="stat"><div class="n">${data.filter(r=>r.out).length}</div><div class="l">Days Clocked Out</div></div>
  <div class="stat" style="border-left-color:#059669"><div class="n" style="color:#059669">${fmtMins(totalEarly)}</div><div class="l">Total Early</div></div>
  <div class="stat" style="border-left-color:#dc2626"><div class="n" style="color:#dc2626">${fmtMins(totalLate)}</div><div class="l">Total Late</div></div>
</div>
<table>
  <thead><tr>
    <th>Date (DD-MM-YYYY)</th>
    <th>In Time</th>
    <th>Out Time</th>
    <th>Early By</th>
    <th>Late By</th>
    <th>Time Cover</th>
  </tr></thead>
  <tbody>${rows}</tbody>
</table>
<div class="note">
  ℹ️ Standard shift = ${WORK_HOURS} hours &nbsp;|&nbsp; Early By = extra time beyond ${WORK_HOURS}h &nbsp;|&nbsp; Late By = shortfall below ${WORK_HOURS}h &nbsp;|&nbsp; Time Cover = net deficit (Late − Early) &nbsp;|&nbsp; (+) = surplus
</div>
<div class="footer">eProcurement Technology &nbsp;•&nbsp; Attendance Tracker &nbsp;•&nbsp; Vikas Songara &nbsp;•&nbsp; Generated on ${dateStr}</div>
<script>window.onload=()=>{window.print();}<\/script>
</body></html>`;

  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  showToast('📄 Print dialog opened → Save as PDF', 'green');
}

// ─── Init ─────────────────────────────────────────────────────
renderTable();
renderTodayStatus();
renderMonthlySummary();
checkInBtn();
</script>
</body>
</html>
